name: Scrape Regulatory Data
on:
  schedule:
    - cron: '0 * * * *'   # every 1 hours, UTC
  workflow_dispatch: {}      # lets you trigger it manually from the Actions tab
permissions:
  contents: write
jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 40   # headless rendering (BSE, PCAOB, IEPFA, MCA incl. filter-click waits) is slower than plain HTTP fetches
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Chromium system dependencies (for Puppeteer)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates fonts-liberation libasound2t64 libatk-bridge2.0-0 libatk1.0-0 \
            libc6 libcairo2 libcups2 libdbus-1-3 libexpat1 libfontconfig1 libgbm1 \
            libglib2.0-0 libgtk-3-0 libnspr4 libnss3 libpango-1.0-0 libpangocairo-1.0-0 \
            libstdc++6 libx11-6 libx11-xcb1 libxcb1 libxcomposite1 libxcursor1 libxdamage1 \
            libxext6 libxfixes3 libxi6 libxrandr2 libxrender1 libxss1 libxtst6 \
            lsb-release wget xdg-utils || true
          # '|| true' because package names occasionally shift between Ubuntu runner
          # images; a missing optional lib usually doesn't stop Chromium from launching.
      - name: Install dependencies
        working-directory: scraper
        run: npm install
      - name: Run scraper
        working-directory: scraper
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          NOTIFY_RECIPIENTS: ${{ secrets.NOTIFY_RECIPIENTS }}
          TRACKER_URL: ${{ secrets.TRACKER_URL }}
        run: node scraper.js
      - name: Commit and push data if changed
        run: |
          git config user.name "regulatory-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/regulatory_data.json
          if [ -d data/debug ]; then
            echo "data/debug exists, contents:"
            ls -la data/debug
            git add data/debug
          else
            echo "data/debug does NOT exist after scraper run"
          fi
          git status
          git diff --staged --quiet || git commit -m "Update regulatory data ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
          git push
      - name: Purge jsDelivr CDN cache
        # jsDelivr caches files served from @main and does NOT reliably refresh just because
        # the underlying GitHub file changed — without this, the tracker frontend (which reads
        # via jsDelivr to work around network restrictions that block raw.githubusercontent.com)
        # can keep serving stale data for hours after a successful scrape.
        run: |
          curl -s "https://purge.jsdelivr.net/gh/${{ github.repository }}@main/data/regulatory_data.json" || true
